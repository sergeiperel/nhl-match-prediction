  postgres:
    image: postgres:15
    container_name: nhl_postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nhl_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - net-back

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


  db-init:
    build: .
    volumes:
      - .:/app
    command: python -m nhl_match_prediction.etl_pipeline.init_db
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - net-back




volumes:
  redis-volume:
  postgres_data:


networks:
  net-front:

  net-back:
