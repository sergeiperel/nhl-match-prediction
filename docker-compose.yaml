services:
  redis:
    image: redis
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-volume:/data
    networks:
      - net-back

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 30s
      #start_interval: 3s


  frontend:
    image: nginx
    volumes:
      - ./content:/usr/share/nginx/html
      - ./configs:/etc/nginx/conf.d:ro  # read-only
    ports:
      - "8081:80"
    networks:
      - net-back
    depends_on:
      backend:
        condition: service_healthy



  backend:
    build: .
    env_file:
      - .env
    ports:
      - "8089:8089"

    volumes:
    - .:/app

    networks:
      - net-front
      - net-back

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/health"]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 30s
      #start_interval: 3s

    depends_on:
      # db-init:
      #   condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

